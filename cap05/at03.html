<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 3 - Capítulo 5</title>
</head>
<body>
    <header>
      <h1>Atividade 3 do Capítulo 5: Formulário de Matrícula Acadêmica</h1>

    <nav aria-label="Navegação secundária">
      <ul>
        <li><a href="../index.html">Voltar para a página principal</a></li>
      </ul>
    </nav>
    </header>
    
    <main>
      <form action="https://httpbin.org/post" method="POST">
        <fieldset>
          <legend>Dados Pessoais</legend>

          <div class="campos">
            <label for="name">Nome completo: <span aria-hidden="true">*</span></label>
            <input 
                type="text" 
                id="name" 
                name="name"
                minlength="3"
                maxlength="100"
                autocomplete="name"
                placeholder="Maria Joaquina"
                aria-required="true"
                required
            >
          </div>
          
          <div class="campos">
            <label for="cpf">CPF: <span aria-hidden="true">*</span></label>
            <input 
                type="text" 
                id="cpf" 
                name="cpf"
                minlength="14"
                maxlength="14"
                autocomplete="cpf"
                placeholder="000.000.000-00"
                pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                title="Digite um CPF no formato 000.000.000-00"
                aria-required="true"
                required
            >
          </div>
          
          <div class="campos">
            <label for="tel">Telefone:</label>
            <input 
                type="tel" 
                id="tel" 
                name="tel"
                pattern="\(\d{2}\)\s\d{4,5}-\d{4}"
                placeholder="(82) 99999-9999"
                autocomplete="tel"
                title="Digite um número no formato (82) 99999-9999"
            >
          </div>
          
          <div class="campos">
            <label for="email">E-mail: <span aria-hidden="true">*</span></label>
            <input 
                type="email" 
                id="email" 
                name="email"
                autocomplete="email"
                placeholder="exemplo@dominio.com"
                aria-required="true"
                required
            >
          </div>
        </fieldset>

        <fieldset>
            <legend>Dados Acadêmicos</legend>
            
            <div class="campos">
                <label for="cursos">Cursos: <span aria-hidden="true">*</span></label>
                <select name="cursos" aria-required="true" required>
                   <option value="">Selecione...</option> 

                   <optgroup label="Computação">
                       <option value="si">Sistemas de Informação</option>
                       <option value="cc">Ciência da Computação</option>
                       <option value="ec">Engenharia de Computação</option>
                   </optgroup>

                   <optgroup label="Gestão">
                       <option value="adm">Administração</option>
                       <option value="cont">Ciências Contábeis</option>
                       <option value="log">Logística</option>
                   </optgroup>
                </select>
            </div>

            <div class="campos">
                <fieldset>
                    <legend>Período</legend>
                    <div class="campos">
                        <input type="radio" name="periodo" id="manha" value="manha" required aria-required="true">
                        <label for="manha">Manhã</label>
                    </div>
                    <div class="campos">
                        <input type="radio" name="periodo" id="tarde" value="tarde">
                        <label for="tarde">Tarde</label>
                    </div>
                    <div class="campos">
                        <input type="radio" name="periodo" id="noite" value="noite">
                        <label for="noite">Noite</label>
                    </div>
                </fieldset>
            </div>

            <div class="campos">
                <label for="ano_ingresso">Ano de Ingresso Pretendido: <span aria-hidden="true">*</span></label>
                <input 
                    type="number" 
                    name="ano_ingresso"
                    id="ano_ingresso"
                    min="2025"
                    max="2030"
                    aria-required="true"
                    required
                >
        </fieldset>

        <fieldset>
            <legend>Áreas de Interesse</legend>

            <div class="campos">
                <label>
                    <input type="checkbox" name="interesses[]" value="dweb">
                    Desenvolvimento Web
                </label>
            </div>
            
            <div class="campos">
                <label>
                    <input type="checkbox" name="interesses[]" value="bdd">
                    Banco de Dados
                </label>
            </div>
            
            <div class="campos">
                <label>
                    <input type="checkbox" name="interesses[]" value="ia">
                    Inteligência Artificial
                </label>
            </div>
            
            <div class="campos">
                <label>
                    <input type="checkbox" name="interesses[]" value="seg">
                    Segurança da Informação
                </label>
            </div>
            
            <div class="campos">
                <label>
                    <input type="checkbox" name="interesses[]" value="infra">
                    Infraestrutura
                </label>
            </div>
        </fieldset>

        <button type="submit">Solicitar matrícula</button>
        <button type="reset">Limpar formulário</button>
      </form>
    </main>
    
    <footer>
    <section>
      <h2>Material de Apoio</h2>
      <p>
        <a href="https://leofernandesmo.github.io/pweb1-book/chapters/05-formularios/" target="_blank" rel="noopener noreferrer">
          Capítulo 5 - Formulários HTML - Programação Web 1, Leonardo Fernandes
        </a>
      </p>
    </section>
      <p>&copy; Miguel Laurentino - 2026</p>
    </footer>
</body>
</html>
